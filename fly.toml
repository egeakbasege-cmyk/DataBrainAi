app = "starcoins-api"
primary_region = "lhr"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  APP_ENV        = "production"
  PORT           = "8000"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

  [[http_service.checks]]
    grace_period  = "10s"
    interval      = "30s"
    method        = "GET"
    timeout       = "5s"
    path          = "/api/health"

[[vm]]
  memory      = "512mb"
  cpu_kind    = "shared"
  cpus        = 1

[processes]
  app    = "uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2"
  worker = "celery -A tasks.celery_tasks worker --concurrency=4 --loglevel=info"
