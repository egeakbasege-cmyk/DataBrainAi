app = "starcoins-api"
primary_region = "lhr"

# ── Required secrets (set via: fly secrets set KEY=value) ─────────────
# fly secrets set DATABASE_URL="postgresql+asyncpg://user:pass@host/db"
# fly secrets set REDIS_URL="redis://..."
# fly secrets set ANTHROPIC_API_KEY="sk-ant-..."
# fly secrets set NEXTAUTH_SECRET="$(openssl rand -hex 32)"
# fly secrets set STRIPE_SECRET_KEY="sk_live_..."
# fly secrets set STRIPE_WEBHOOK_SECRET="whsec_..."
# Optional:
# fly secrets set SENTRY_DSN="https://..."
# fly secrets set ALLOWED_ORIGIN="https://starcoins.ai"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  APP_ENV        = "production"
  PORT           = "8000"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

  [[http_service.checks]]
    grace_period  = "10s"
    interval      = "30s"
    method        = "GET"
    timeout       = "5s"
    path          = "/api/health"

[[vm]]
  memory      = "512mb"
  cpu_kind    = "shared"
  cpus        = 1

[processes]
  app    = "uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2"
  worker = "celery -A tasks.celery_tasks worker --concurrency=4 --loglevel=info"

[[vm.processes]]
  name   = "worker"
  memory = "512mb"
