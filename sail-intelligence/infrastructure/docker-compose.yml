version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Sail Intelligence — Local Development Stack
#
# Services:
#   postgres   — relational ontology store (port 5432)
#   redis      — Celery broker + pub/sub (port 6379)
#   backend    — FastAPI app (port 8000)
#   worker     — Celery worker (SAIL + YACHT + MOTOR tasks)
#   beat       — Celery Beat scheduler (cron triggers)
#   frontend   — React + Vite dev server (port 5173)
# ─────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-sail_intelligence}
      POSTGRES_USER:     ${POSTGRES_USER:-sail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sail}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - ../backend/app:/app/app   # hot-reload in dev
    command: >
      uvicorn app.main:app
      --host 0.0.0.0 --port 8000
      --reload --reload-dir /app/app

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: >
      celery -A app.tasks.celery_app.celery_app worker
      --loglevel=info --concurrency=4

  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      redis: { condition: service_healthy }
    command: >
      celery -A app.tasks.celery_app.celery_app beat
      --loglevel=info --scheduler celery.beat.PersistentScheduler

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000

volumes:
  postgres_data:
  redis_data:
